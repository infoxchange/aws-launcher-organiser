name: Publish Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test-publish/*

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write # semantic-release --dry-run verifies push permission even though nothing is pushed
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get node version
        id: get-node-version
        shell: bash
        run: echo "node-version=$(jq -r '.engines.node // "lts/*"' package.json)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.get-node-version.outputs.node-version }}

      - name: Install dependencies
        run: npm clean-install

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Determine version and update files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release --dry-run

      - name: Build for all browsers
        run: npm run build:all

      - name: Create ZIPs
        run: |
          npm run zip
          npm run zip:firefox
          npm run zip:chrome
          ls -hal .output
          echo ---
          ls -hal .output/*.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: .output/*.zip
          retention-days: 7
          if-no-files-found: error

  submit:
    name: Submit to stores
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get node version
        id: get-node-version
        shell: bash
        run: echo "node-version=$(jq -r '.engines.node // "lts/*"' package.json)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.get-node-version.outputs.node-version }}

      - name: Install dependencies
        run: npm clean-install

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-zips
          path: .output

      - name: Release with semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_ACCESS_TOKEN_URL: ${{ secrets.EDGE_ACCESS_TOKEN_URL }}
        run: npx semantic-release

      - name: Print publish info
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [[ ! "$VERSION" == 0.0.0* ]]; then
            prefix_message="Published new version:"
            echo -e "### :rocket: $prefix_message \n\`\`\`\n$VERSION\n\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo -e "$prefix_message\n\e[1m$VERSION\e[0m"
          else
            message="No publishable changes made since last version"
            echo "### $message" >> $GITHUB_STEP_SUMMARY
            echo -e "\e[1m$message\e[0m"
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: submit-logs
          path: |
            ~/.npm/_logs/*
